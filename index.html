<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Sistema de Gestión de Ventas</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --primary: #1e293b;
            --accent: #2563eb;
            --text-main: #334155;
            --text-muted: #64748b;
            --success: #16a34a;
            --danger: #dc2626;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border);
        }

        .header {
            margin-bottom: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 20px;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 14px;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--primary);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-prefix {
            position: absolute;
            left: 12px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            font-size: 15px;
            border: 1px solid var(--border);
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s;
            color: var(--text-main);
            background-color: #f8fafc;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent);
            background-color: #fff;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #1d4ed8;
        }

        .response-box {
            margin-top: 24px;
            padding: 15px;
            border-radius: 6px;
            font-size: 13px;
            display: none;
            border: 1px solid var(--border);
        }

        .response-box.success {
            display: block;
            background-color: #f0fdf4;
            color: #166534;
            border-color: #bbf7d0;
        }

        .response-box.error {
            display: block;
            background-color: #fef2f2;
            color: #991b1b;
            border-color: #fecaca;
        }

        .response-box h3 {
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .response-box pre {
            font-family: monospace;
            background: rgba(0,0,0,0.03);
            padding: 8px;
            border-radius: 4px;
            overflow-x: auto;
            margin-top: 6px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Registro de Venta Inteligente</h1>
            <p>Facturación Electrónica, Stock y Caja
