<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Sistema de Gestión de Ventas</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --primary: #1e293b;
            --accent: #2563eb;
            --text-main: #334155;
            --text-muted: #64748b;
            --success: #16a34a;
            --danger: #dc2626;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Permite que empiece arriba y se pueda deslizar */
            min-height: 100vh;
            overflow-y: auto; /* Forzar que el celular permita bajar con el dedo */
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .header {
            margin-bottom: 18px;
            text-align: center;
        }

        .header h1 {
            font-size: 19px;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--primary);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-prefix {
            position: absolute;
            left: 12px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 8px 10px;
            font-size: 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            outline: none;
            color: var(--text-main);
            background-color: #f8fafc;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent);
            background-color: #fff;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 5px;
        }

        .btn-submit:hover {
            background-color: #1d4ed8;
        }

        .response-box {
            margin-top: 18px;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            display: none;
            border: 1px solid var(--border);
        }

        .response-box.success {
            display: block;
            background-color: #f0fdf4;
            color: #166534;
            border-color: #bbf7d0;
        }

        .response-box.error {
            display: block;
            background-color: #fef2f2;
            color: #991b1b;
            border-color: #fecaca;
        }

        .response-box pre {
            font-family: monospace;
            background: rgba(0,0,0,0.03);
            padding: 6px;
            border-radius: 4px;
            overflow-x: auto;
            margin-top: 6px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Registro de Venta Inteligente</h1>
            <p>Facturación Electrónica, Stock y Caja</p>
        </div>

        <form id="ventaForm">
            <div class="form-group">
                <label for="cliente_rut">RUT del Cliente</label>
                <input type="text" id="cliente_rut" placeholder="Ej. 219999990018" required pattern="[0-9]{12}" title="El RUT debe tener 12 dígitos numéricos">
            </div>

            <div class="form-group">
                <label for="kilos">Cantidad de Kilos (Stock)</label>
                <input type="number" id="kilos" step="0.01" placeholder="Ej. 80.00" required min="0.01">
            </div>

            <div class="form-group">
                <label for="monto_total_uyu">Monto Total (UYU)</label>
                <div class="input-wrapper">
                    <span class="input-prefix">$</span>
                    <input type="number" id="monto_total_uyu" step="0.01" placeholder="12000.00" required min="1" style="padding-left: 28px;">
                </div>
            </div>

            <div class="form-group">
                <label for="metodo_pago">Método de Pago</label>
                <select id="metodo_pago" required>
                    <option value="Transferencia">Transferencia Bancaria</option>
                    <option value="Efectivo">Efectivo</option>
                    <option value="Débito">Tarjeta de Débito</option>
                    <option value="Crédito">Tarjeta de Crédito</option>
                </select>
            </div>

            <button type="submit" class="btn-submit">Procesar Operación</button>
        </form>

        <div id="responseBox" class="response-box">
            <h3 id="responseTitle"></h3>
            <p id="responseText"></p>
            <pre id="responseJson"></pre>
        </div>
    </div>

    <script>
        document.getElementById('ventaForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const rut = document.getElementById('cliente_rut').value;
            const kilos = parseFloat(document.getElementById('kilos').value);
            const monto = parseFloat(document.getElementById('monto_total_uyu').value);
            const metodo = document.getElementById('metodo_pago').value;

            const responseBox = document.getElementById('responseBox');
            const responseTitle = document.getElementById('responseTitle');
            const responseText = document.getElementById('responseText');
            const responseJson = document.getElementById('responseJson');

            responseBox.className = "response-box success";
            responseTitle.innerText = "⏳ Procesando operación...";
            responseText.innerText = "Conectando de forma segura con tu servidor en Railway...";
            responseJson.innerText = "";

            try {
                const response = await fetch('https://facturaci-n-production.up.railway.app/api/v1/ventas', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        cliente_rut: rut,
                        kilos: kilos,
                        monto_total_uyu: monto,
                        metodo_pago: metodo
                    })
                });

                const resultado = await response.json();

                if (response.ok) {
                    responseBox.className = "response-box success";
                    responseTitle.innerText = "✅ Operación Guardada Exitosamente";
                    responseText.innerText = "Los datos se han registrado de forma real en tu base de datos PostgreSQL.";
                    responseJson.innerText = JSON.stringify(resultado, null, 2);
                } else {
                    throw new Error(resultado.message || "Error devuelto por el servidor.");
                }

            } catch (error) {
                responseBox.className = "response-box error";
                responseTitle.innerText = "❌ Error de Conexión";
                responseText.innerText = "Hubo un problema al intentar guardar los datos en Railway.";
                responseJson.innerText = error.message;
            }
        });
    </script>
</body>
</html>
