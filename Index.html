<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Sistema de Gestión de Ventas</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --primary: #1e293b;
            --accent: #2563eb;
            --text-main: #334155;
            --text-muted: #64748b;
            --success: #16a34a;
            --danger: #dc2626;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border);
        }

        .header {
            margin-bottom: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 20px;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 14px;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--primary);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-prefix {
            position: absolute;
            left: 12px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            font-size: 15px;
            border: 1px solid var(--border);
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s;
            color: var(--text-main);
            background-color: #f8fafc;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent);
            background-color: #fff;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #1d4ed8;
        }

        .response-box {
            margin-top: 24px;
            padding: 15px;
            border-radius: 6px;
            font-size: 13px;
            display: none;
            border: 1px solid var(--border);
        }

        .response-box.success {
            display: block;
            background-color: #f0fdf4;
            color: #166534;
            border-color: #bbf7d0;
        }

        .response-box h3 {
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .response-box pre {
            font-family: monospace;
            background: rgba(0,0,0,0.03);
            padding: 8px;
            border-radius: 4px;
            overflow-x: auto;
            margin-top: 6px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Registro de Venta Inteligente</h1>
            <p>Facturación Electrónica, Stock y Caja Automatizada</p>
        </div>

        <form id="ventaForm">
            <div class="form-group">
                <label for="cliente_rut">RUT del Cliente</label>
                <input type="text" id="cliente_rut" placeholder="Ej. 219999990018" required pattern="[0-9]{12}" title="El RUT debe tener 12 dígitos numéricos">
            </div>

            <div class="form-group">
                <label for="kilos">Cantidad de Kilos (Stock)</label>
                <input type="number" id="kilos" step="0.01" placeholder="Ej. 80.00" required min="0.01">
            </div>

            <div class="form-group">
                <label for="monto_total_uyu">Monto Total (UYU)</label>
                <div class="input-wrapper">
                    <span class="input-prefix">$</span>
                    <input type="number" id="monto_total_uyu" step="0.01" placeholder="12000.00" required min="1" style="padding-left: 28px;">
                </div>
            </div>

            <div class="form-group">
                <label for="metodo_pago">Método de Pago</label>
                <select id="metodo_pago" required>
                    <option value="Transferencia">Transferencia Bancaria</option>
                    <option value="Efectivo">Efectivo</option>
                    <option value="Debito">Tarjeta de Débito</option>
                    <option value="Credito">Tarjeta de Crédito</option>
                </select>
            </div>

            <button type="submit" class="btn-submit">Procesar Operación</button>
        </form>

        <div id="responseBox" class="response-box">
            <h3 id="responseTitle"></h3>
            <p id="responseText"></p>
            <pre id="responseJson"></pre>
        </div>
    </div>

    <script>
        document.getElementById('ventaForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const rut = document.getElementById('cliente_rut').value;
            const kilos = parseFloat(document.getElementById('kilos').value);
            const monto = parseFloat(document.getElementById('monto_total_uyu').value);
            const metodo = document.getElementById('metodo_pago').value;

            const responseBox = document.getElementById('responseBox');
            const responseTitle = document.getElementById('responseTitle');
            const responseText = document.getElementById('responseText');
            const responseJson = document.getElementById('responseJson');

            // Mostrar estado de carga simulado
            responseBox.className = "response-box success";
            responseTitle.innerText = "⏳ Procesando en DGI e Inventario...";
            responseText.innerText = "Conectando de forma segura con la API corporativa...";
            responseJson.innerText = "";

            // Simular retraso de respuesta de API (1.5 segundos)
            setTimeout(() => {
                const stockPrevio = 1500.50;
                const cajaPrevia = 73400.00;
                
                const simResponse = {
                    "status": "success",
                    "timestamp": new Date().toISOString(),
                    "data": {
                        "facturacion_dgi": {
                            "estado": "APROBADO_DGI",
                            "tipo_cfe": "111 - e-Factura",
                            "serie_numero": "A-" + Math.floor(Math.random() * (20000 - 10000) + 10000),
                            "url_pdf_factura": "#"
                        },
                        "inventario": {
                            "movimiento": "EGRESO",
                            "kilos_restados": kilos,
                            "stock_actual_kilos": (stockPrevio - kilos).toFixed(2)
                        },
                        "caja_flujo": {
                            "movimiento": "INGRESO_CAJA",
                            "monto": monto,
                            "saldo_actual_caja_uyu": (cajaPrevia + monto).toFixed(2)
                        }
                    }
                };

                responseTitle.innerText = "✅ Operación Exitosa";
                responseText.innerText = "La DGI autorizó el comprobante electrónico, se actualizaron los kilos en stock y el flujo de caja.";
                responseJson.innerText = JSON.stringify(simResponse, null, 2);
            }, 1500);
        });
    </script>
</body>
                      </html>
